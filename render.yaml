services:
  # FastAPI Web Service
  - type: web
    name: ai-chatbot-api
    env: python
    buildCommand: uv sync --frozen --no-dev
    startCommand: uv run alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: POSTGRES_URL
        fromDatabase:
          name: ai-chatbot-db
          property: connectionString
      - key: ELASTICSEARCH_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DEBUG
        value: "False"

  # Managed PostgreSQL Database
  - type: pgo
    name: ai-chatbot-db
    plan: starter
    postgresMajorVersion: 16
